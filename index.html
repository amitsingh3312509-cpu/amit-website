
<!DOCTYPE html>
<html>
<head>
<title>Amantran Restaurant Order</title>

<script>

function setDateTime(){

let now=new Date()

document.getElementById("date").value=now.toLocaleDateString()
document.getElementById("day").value=now.toLocaleString('en-us',{weekday:'long'})
document.getElementById("time").value=now.toLocaleTimeString()

}

function calculate(){

let food=document.getElementById("food")

let price=parseInt(food.options[food.selectedIndex].getAttribute("data-price"))

let piece=document.getElementById("piece").value

let total=price*piece

document.getElementById("total").value=total

let advance=total/2

document.getElementById("advance").value=advance

document.getElementById("paylink").href=
"upi://pay?pa=7309277213@ibl&pn=Amantran%20Restaurant&am="+advance+"&cu=INR"

}

</script>

</head>

<body onload="setDateTime()">

<h2>Amantran Restaurant Order</h2>

<form action="https://formsubmit.co/amitsingh3312509@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

Name
<br>
<input type="text" name="Customer Name" required>

<br><br>

Mobile
<br>
<input type="text" name="Mobile" required>

<br><br>

Food Item
<br>

<select id="food" name="Food Name" onchange="calculate()">

<option data-price="100">Veg Burger ₹100</option>
<option data-price="120">Paneer Butter Masala ₹120</option>
<option data-price="150">Chicken Curry ₹150</option>
<option data-price="80">Veg Noodles ₹80</option>

</select>

<br><br>

Piece
<br>

<input type="number" id="piece" name="Piece" value="1" onchange="calculate()">

<br><br>

Total Price
<br>

<input type="text" id="total" name="Total Price" readonly>

<br><br>

Advance (50%)
<br>

<input type="text" id="advance" name="Advance Price" readonly>

<br><br>

Date
<br>

<input type="text" id="date" name="Date">

<br><br>

Day
<br>

<input type="text" id="day" name="Day">

<br><br>

Time
<br>

<input type="text" id="time" name="Time">

<br><br>

<button type="submit">Order Send</button>

<br><br>

<a id="paylink" href="upi://pay?pa=7309277213@ibl&pn=Amantran%20Restaurant&am=50&cu=INR">

<button type="button">Pay Advance</button>

</a>

</form>

</body>
  </html>
