<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:22px;font-weight:bold;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
}

button{
width:100%;padding:12px;margin-top:6px;
border:none;border-radius:6px;color:white;
}

.cart{background:#eee;padding:10px;margin-top:10px;}

.note{color:red;text-align:center;font-weight:bold;}

.qr{width:220px;display:block;margin:auto;cursor:pointer;}

.bottom{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:15px;
}

.bottom a{
color:white;padding:8px 15px;border-radius:20px;
text-decoration:none;font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#ff3b3b;}

.msg{color:green;text-align:center;font-weight:bold;}

</style>

</head>

<body>

<div class="header">
🍕 Royal Pizza Home Bansdih
</div>

<div class="container">

<form id="form" action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST">

<h3>Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza</option>
<option value="150">Veg ₹150</option>
<option value="200">Paneer ₹200</option>
<option value="250">Cheese ₹250</option>
</select>

<input type="number" id="qty" value="1">

<button type="button" onclick="addCart()">Add To Cart</button>

<div class="cart">
<div id="cart"></div>
<p>Total ₹ <span id="total">0</span></p>
<p>Advance ₹ <span id="adv">0</span></p>
</div>

<h3>Customer Details / ग्राहक जानकारी</h3>

<input name="Name" id="name" placeholder="Name / नाम" required>
<input name="Mobile" id="mobile" placeholder="Mobile / मोबाइल" required>

<select name="Village" id="village" required onchange="showTime()">
<option value="">Select Village</option>
<option value="Seriya" data-time="25">Seriya (25 min)</option>
<option value="Bansdih" data-time="20">Bansdih (20 min)</option>
<option value="Halpur" data-time="30">Halpur (30 min)</option>
<option value="Kewtallia" data-time="35">Kewtallia (35 min)</option>
<option value="Asega" data-time="40">Asega (40 min)</option>
</select>

<p id="timeShow"></p>

<p class="note">
⚠️ 50% advance compulsory
</p>

<h3>💳 Payment</h3>

<img class="qr" src="PUT_QR_LINK_HERE" onclick="openUPI()">

<p style="text-align:center;">Scan / Click to Pay</p>

<p style="text-align:center;">UPI: 7309277213@ibl</p>

<input name="TransactionID" id="txn" placeholder="Transaction ID" required>

<input type="hidden" name="OrderDetails" id="orderData">
<input type="hidden" name="DeliveryTime" id="hiddenTime">

<button type="submit">Submit Order</button>

</form>

<button onclick="downloadPDF()">Download Receipt</button>

<p class="msg" id="msg"></p>

</div>

<div class="bottom">
<a class="whatsapp" href="https://wa.me/917309277213">WhatsApp</a>
<a class="call" href="tel:7309277213">Call</a>
</div>

<script>

let cart=[],total=0,deliveryTime="";

/* CART */
function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){alert("Select Pizza");return;}

cart.push({name,price,q});
total+=price*q;
showCart();
}

function showCart(){
let box=document.getElementById("cart");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+"<br>";
});
document.getElementById("total").innerText=total;
document.getElementById("adv").innerText=Math.round(total/2);
}

/* VILLAGE TIME */
function showTime(){
let select=document.getElementById("village");
let time=select.options[select.selectedIndex].getAttribute("data-time");

deliveryTime=time;
document.getElementById("timeShow").innerText="Delivery: "+time+" min";
document.getElementById("hiddenTime").value=time+" min";
}

/* UPI */
function openUPI(){
window.location.href="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR";
}

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit",function(e){

let txn=document.getElementById("txn").value;

if(txn==""){
alert("Enter Transaction ID");
e.preventDefault();
return;
}

let data="";
cart.forEach(c=>{
data+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+" | ";
});
document.getElementById("orderData").value=data;

document.getElementById("msg").innerText=
"✅ Order Submitted! Delivery in "+deliveryTime+" min";

});

/* PDF */
function downloadPDF(){

const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let village=document.getElementById("village").value;
let txn=document.getElementById("txn").value;

let d=new Date();

let totalAmt=total;
let adv=Math.round(total/2);

pdf.setTextColor(200,200,200);
pdf.setFontSize(35);
pdf.text("Royal Pizza Home Bansdih",10,100,{angle:45});

pdf.setTextColor(0,0,0);
pdf.setFontSize(12);

let y=20;

pdf.text("ROYAL PIZZA RECEIPT",20,y); y+=10;
pdf.text("Name: "+name,20,y); y+=8;
pdf.text("Mobile: "+mobile,20,y); y+=8;
pdf.text("Village: "+village,20,y); y+=8;

cart.forEach(c=>{
pdf.text(c.name+" x"+c.q+" ₹"+(c.price*c.q),20,y);
y+=8;
});

pdf.text("Total: ₹"+totalAmt,20,y); y+=8;
pdf.text("Advance: ₹"+adv,20,y); y+=8;

pdf.text("Txn: "+txn,20,y); y+=8;

pdf.text("Date: "+d.toLocaleDateString(),20,y); y+=8;
pdf.text("Time: "+d.toLocaleTimeString(),20,y); y+=8;

pdf.save("Receipt.pdf");

}

</script>

</body>
 </html>
