<!DOCTYPE html>
<html>
<head>
<title>Amantran Restaurant Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family:Arial;
  background:linear-gradient(45deg,#ff9966,#ff5e62);
  text-align:center;
}
.container{
  background:white;
  padding:20px;
  margin:auto;
  width:350px;
  border-radius:10px;
}
h1{
  color:red;
}
input, select, button{
  width:95%;
  padding:10px;
  margin:5px 0;
}
button{
  background:green;
  color:white;
  border:none;
  width:100%;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Amantran Restaurant</h1>

<form id="orderform" action="https://formsubmit.co/YOUR_OWNER_EMAIL@gmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">

<label>Name</label><br>
<input type="text" name="Customer Name" required><br>

<label>Mobile</label><br>
<input type="text" name="Mobile" required><br>

<label>Village</label><br>
<input type="text" name="Village"><br>

<label>Food Item</label><br>
<select id="food" name="Food Name" onchange="updatePrice()">
<option value="Veg Sandwich" data-price="80">Veg Sandwich - ₹80</option>
<option value="Veg Burger" data-price="60">Veg Burger - ₹60</option>
<option value="Paneer Burger" data-price="70">Paneer Burger - ₹70</option>
<option value="Masala Dosa" data-price="110">Masala Dosa - ₹110</option>
<option value="Paneer Butter Masala" data-price="180">Paneer Butter Masala - ₹180</option>
<option value="Chicken Biryani" data-price="260">Chicken Biryani - ₹260</option>
</select>

<br><br>

<label>Plate / Piece</label><br>
<select name="Type">
<option>Plate</option>
<option>Piece</option>
</select>

<br><br>

<label>Quantity</label><br>
<input type="number" id="qty" value="1" onchange="updatePrice()">

<br><br>

<label>Unit Price (Food Rate)</label><br>
<input type="text" id="unitPrice" name="Food Rate" readonly>

<br><br>

<label>Total</label><br>
<input type="text" id="total" name="Total" readonly>

<br><br>

<label>Advance (50%)</label><br>
<input type="text" id="advance" name="Advance">

<br><br>

<label>Date</label><br>
<input type="text" id="date" name="Date" readonly><br>

<label>Day</label><br>
<input type="text" id="day" name="Day" readonly><br>

<label>Time</label><br>
<input type="text" id="time" name="Time" readonly><br>

<label>UPI Transaction ID</label><br>
<input type="text" name="UPI Transaction ID" placeholder="Enter UPI Payment ID" required><br>

<input type="hidden" id="receipt" name="Receipt Number">

<button type="button" onclick="pay()">Pay & Confirm Order</button>

</form>
</div>

<script>
function updatePrice(){
  var food = document.getElementById("food");
  var unitPrice = food.options[food.selectedIndex].dataset.price;
  var qty = document.getElementById("qty").value;
  var total = unitPrice * qty;

  document.getElementById("unitPrice").value = unitPrice; // Food Rate
  document.getElementById("total").value = total;
  document.getElementById("advance").value = total / 2;
}

// Auto fill Date, Day, Time
var d = new Date();
document.getElementById("date").value = d.toLocaleDateString();
document.getElementById("day").value = d.toLocaleString('en-us',{weekday:'long'});
document.getElementById("time").value = d.toLocaleTimeString();

// Generate Receipt Number
var receiptNum = "AMT" + Math.floor(Math.random()*900000 + 100000);
document.getElementById("receipt").value = receiptNum;

// UPI Payment + manual transaction ID
function pay(){
  var advance = document.getElementById("advance").value;
  var upi = "upi://pay?pa=YOUR_UPI_ID&pn=AmantranRestaurant&am="+advance+"&cu=INR";
  
  // Open UPI app
  window.location.href = upi;

  alert("Please complete payment in your UPI app. After payment, copy Transaction ID and paste in 'UPI Transaction ID' field, then click button again.");

  if(document.querySelector("input[name='UPI Transaction ID']").value !== ""){
    document.getElementById("orderform").submit();
  }
}
</script>

</body>
  </html>
